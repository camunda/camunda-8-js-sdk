name: CI

on:
  # Push to a feature branch (anything except main and stable/**) runs the
  # non-blocking CI suite for fast feedback before a PR is opened.
  # `pull_request` then re-runs the same suite once a PR exists, so the
  # author also sees the result against the PR's merge commit.
  # Merges to `main` and `stable/**` are handled by the Release workflow,
  # which runs the same non-gated jobs plus the gated integration / SaaS
  # jobs as part of its pipeline. Listing those branches here would just
  # duplicate runs on the same SHA.
  push:
    branches-ignore:
      - main
      - 'stable/**'
  pull_request:

jobs:
  # Runs on every push to main or stable/**, and every pull request,
  # including
  # pull requests from forks. No secrets required.
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Build and Smoke Test
        run: npm run test:smoketest

      - name: Run Unit Tests
        run: npm run test

  # 8.8 self-managed integration tests. Uses only the public docker-compose
  # stack — no secrets required. Runs on every push and every pull request
  # (including fork PRs) so external contributors get PR feedback.
  local_integration_8_8:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      # Workaround for https://github.com/actions/runner-images/issues/2821
      - name: Remove mono blocking 8084 port
        run: sudo lsof -t -i:8084 | xargs -r sudo kill -9

      - name: Set up Docker Compose
        run: |
          docker compose -f docker/docker-compose-8.8.yaml up -d

      - name: Wait for Services Healthy
        run: |
          set -e
          attempts=0
          max_attempts=60
          while [ $attempts -lt $max_attempts ]; do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:9600/actuator/health/status || true)
            [ "$code" = "200" ] && echo "Broker healthy" && break
            attempts=$((attempts+1))
            sleep 5
          done
          [ $attempts -ge $max_attempts ] && echo "Broker not healthy" && exit 1 || true

      - name: Run Integration Tests
        run: |
          npm run test:8.8:sm
        env:
          ZEEBE_GRPC_ADDRESS: grpc://localhost:26500
          CAMUNDA_AUTH_STRATEGY: NONE
          CAMUNDA_TENANT_ID: <default>

      - name: Cleanup
        if: always()
        run: docker compose -f docker/docker-compose-8.8.yaml down

  # 8.8 test suite run against an 8.9 self-managed broker. Public stack — no
  # secrets required. Runs on every push and every pull request.
  local_integration_8_8_against_8_9:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      # Workaround for https://github.com/actions/runner-images/issues/2821
      - name: Remove mono blocking 8084 port
        run: sudo lsof -t -i:8084 | xargs -r sudo kill -9

      - name: Set up Docker Compose
        run: |
          docker compose -f docker/8.9/docker-compose.yaml up -d

      - name: Wait for Services Healthy
        run: |
          set -e
          attempts=0
          max_attempts=60
          while [ $attempts -lt $max_attempts ]; do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:9600/actuator/health/status || true)
            [ "$code" = "200" ] && echo "Broker healthy" && break
            attempts=$((attempts+1))
            sleep 5
          done
          [ $attempts -ge $max_attempts ] && echo "Broker not healthy" && exit 1 || true

      - name: Run Integration Tests (8.8 tests against 8.9 server)
        run: |
          npm run test:8.8:sm
        env:
          ZEEBE_GRPC_ADDRESS: grpc://localhost:26500
          CAMUNDA_AUTH_STRATEGY: NONE
          CAMUNDA_TENANT_ID: <default>

      - name: Cleanup
        if: always()
        run: docker compose -f docker/8.9/docker-compose.yaml down


  # 8.7 self-managed integration tests. Uses DOCKER_PASSWORD from the
  # `selfhosted` GitHub environment to pull images from registry.camunda.cloud.
  # Heavy stack (full Camunda + Modeler), so PR-only — not on every push to a
  # feature branch. Fork PRs cannot read environment secrets, so the docker
  # login step skips them automatically.
  local_integration:
    if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    environment:
      name: selfhosted
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      # Workaround for https://github.com/actions/runner-images/issues/2821
      - name: Remove mono blocking 8084 port
        run: sudo lsof -t -i:8084 | xargs -r sudo kill -9

      - name: Set up Docker
        run: |
          echo ${{ secrets.DOCKER_PASSWORD }} | docker login --username joshua.wulf --password-stdin registry.camunda.cloud

      - name: Set up Docker Compose
        run: |
          docker compose -f docker/docker-compose.yaml -f docker/docker-compose-modeler.yaml up -d
        timeout-minutes: 10

      - name: Run Integration Tests
        run: |
          npm run test:8.7:sm
        env:
          ZEEBE_GRPC_ADDRESS: grpc://localhost:26500
          ZEEBE_CLIENT_ID: zeebe
          ZEEBE_CLIENT_SECRET: zecret
          CAMUNDA_OAUTH_URL: http://localhost:18080/auth/realms/camunda-platform/protocol/openid-connect/token
          CAMUNDA_TASKLIST_BASE_URL: http://localhost:8082
          CAMUNDA_OPERATE_BASE_URL: http://localhost:8081
          CAMUNDA_OPTIMIZE_BASE_URL: http://localhost:8083
          CAMUNDA_MODELER_BASE_URL: http://localhost:8070/api

      - name: Cleanup
        if: always()
        run: docker compose -f docker/docker-compose.yaml -f docker/docker-compose-modeler.yaml down

  # 8.7 self-managed multi-tenancy stack. Same trigger shape as local_integration.
  local_multitenancy_integration:
    if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    environment:
      name: selfhosted
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      # Workaround for https://github.com/actions/runner-images/issues/2821
      - name: Remove mono blocking 8084 port
        run: sudo lsof -t -i:8084 | xargs -r sudo kill -9

      - name: Set up Docker
        run: |
          echo ${{ secrets.DOCKER_PASSWORD }} | docker login --username joshua.wulf --password-stdin registry.camunda.cloud

      - name: Set up Docker Compose
        run: |
          docker compose -f docker/docker-compose-multitenancy.yaml -f docker/docker-compose-modeler.yaml up -d
        timeout-minutes: 10

      - name: Run Integration Tests
        run: |
          npm run test:8.7:mt
        env:
          ZEEBE_GRPC_ADDRESS: grpc://localhost:26500
          ZEEBE_CLIENT_ID: zeebe
          ZEEBE_CLIENT_SECRET: zecret
          CAMUNDA_OAUTH_URL: http://localhost:18080/auth/realms/camunda-platform/protocol/openid-connect/token
          CAMUNDA_TASKLIST_BASE_URL: http://localhost:8082
          CAMUNDA_OPERATE_BASE_URL: http://localhost:8081
          CAMUNDA_OPTIMIZE_BASE_URL: http://localhost:8083
          CAMUNDA_MODELER_BASE_URL: http://localhost:8070/api
          # Needed for Multi-Tenancy
          CAMUNDA_TENANT_ID: <default>

      - name: Cleanup
        if: always()
        run: docker compose -f docker/docker-compose-multitenancy.yaml -f docker/docker-compose-modeler.yaml down
