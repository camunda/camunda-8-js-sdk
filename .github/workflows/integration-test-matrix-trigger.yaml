# description: trigger workflow to run the integration-test-matrix.yml workflow on a schedule
# type: CI
# owner: @camunda/camunda-ex
name: Camunda 8 JS Compatibility Tests - Trigger

on:
  schedule:
    # Run daily at 02:00 UTC
    - cron: "0 2 * * *"

jobs:
  trigger-stable-8-8:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger compatibility tests on stable/8.8
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run .github/workflows/integration-test-matrix.yml \
            --ref stable/8.8 \
            --repo ${{ github.repository }}

